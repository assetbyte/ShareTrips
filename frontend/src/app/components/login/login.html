<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
  <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Login to ShareTrips</h2>
  
  <div style="margin-bottom: 15px;">
    <label style="display: block; margin-bottom: 5px;">Username:</label>
    <input type="text" [(ngModel)]="loginCredentials.username" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;">
  </div>

  <div style="margin-bottom: 20px;">
    <label style="display: block; margin-bottom: 5px;">Password:</label>
    <input type="password" [(ngModel)]="loginCredentials.password" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;">
  </div>

  <button (click)="onLogin()" style="background: #007bff; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px;">
    Log in
  </button>
</div>
