<div style="padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <h2 style="margin-top: 0; color: #1f2937; font-size: 20px; font-weight: 700; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px;">
    Leave a review for @{{ data.receiver.username }}
  </h2>

  <div style="margin-top: 15px;">
    <label style="display: block; font-weight: 600; color: #4b5563; margin-bottom: 6px; font-size: 14px;">Rating (Stars):</label>
    <select [(ngModel)]="rating" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white;">
      <option [ngValue]="5">★★★★★ 5/5</option>
      <option [ngValue]="4">★★★★ 4/5</option>
      <option [ngValue]="3">★★★ 3/5</option>
      <option [ngValue]="2">★★ 2/5</option>
      <option [ngValue]="1">★ 1/5</option>
    </select>
  </div>

  <div style="margin-top: 15px;">
    <label style="display: block; font-weight: 600; color: #4b5563; margin-bottom: 6px; font-size: 14px;">Your Comment:</label>
    <textarea 
      [(ngModel)]="comment" 
      placeholder="How was your trip together? Would you travel with them again?" 
      style="width: 100%; height: 100px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; resize: vertical;"
    ></textarea>
  </div>

  <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
    <button 
      (click)="onCancel()" 
      style="background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;"
    >
      Cancel
    </button>
    <button 
      (click)="onSubmit()" 
      style="background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;"
    >
      Submit Review
    </button>
  </div>
</div>
