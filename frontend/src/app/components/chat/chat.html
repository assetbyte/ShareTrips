<div style="max-width: 600px; margin: 30px auto; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 style="margin: 0; font-size: 20px; font-weight: 700; color: #1a1a1a;">Team Chat (Trip #{{ tripId }})</h2>
    <a routerLink="/my-team" style="color: #2563eb; text-decoration: none; font-size: 14px; font-weight: 500;">← Back to My Team</a>
  </div>

  <div style="background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; height: 450px; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
    
    <div style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f9fafb; border-radius: 12px 12px 0 0;">
      <p *ngIf="messages.length === 0" style="text-align: center; color: #9ca3af; font-size: 14px; margin-top: 150px;">No messages yet. Say hello to your team!</p>
      
      <div *ngFor="let msg of messages" 
           [style.align-self]="msg.username === currentUsername ? 'flex-end' : 'flex-start'"
           [style.max-width]="'75%'">
        
        <small *ngIf="msg.username !== currentUsername" style="display: block; font-size: 11px; color: #6b7280; margin-bottom: 3px; margin-left: 4px;">
          &#64;{{ msg.username }}
        </small>

        <div [style.background]="msg.username === currentUsername ? '#2563eb' : '#e5e7eb'"
             [style.color]="msg.username === currentUsername ? '#ffffff' : '#1f2937'"
             style="padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
          {{ msg.message }}
        </div>
      </div>
    </div>

    <form (ngSubmit)="send()" style="display: flex; gap: 10px; padding: 16px; border-top: 1px solid #e5e7eb; background: #ffffff; border-radius: 0 0 12px 12px;">
      <input 
        type="text" 
        [(ngModel)]="newMessage" 
        name="message" 
        placeholder="Type a message..." 
        autocomplete="off"
        style="flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; outline: none;"
      >
      <button 
        type="submit" 
        style="background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;"
      >
        Send
      </button>
    </form>

  </div>
</div>
