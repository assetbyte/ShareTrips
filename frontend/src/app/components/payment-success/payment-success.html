<div style="max-width: 500px; margin: 60px auto; padding: 40px 20px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ffffff; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e5e7eb;">
  
  <div style="width: 72px; height: 72px; background: #dcfce7; color: #16a34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto;">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" style="width: 36px; height: 36px;">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
    </svg>
  </div>

  <h2 style="color: #111827; font-size: 26px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px;">
    Payment Successful!
  </h2>
  
  <p style="color: #4b5563; font-size: 15px; line-height: 1.6; margin-bottom: 32px;">
    Your seat is now officially secured. The driver and your teammates have been notified. Get ready for the road trip!
  </p>

  <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px; margin-bottom: 32px; font-size: 13px; color: #64748b; text-align: left;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
      <span>Application ID:</span>
      <strong style="color: #334155;">#{{ applicationId || 'N/A' }}</strong>
    </div>
    <div style="display: flex; justify-content: space-between;">
      <span>Status:</span>
      <strong style="color: #16a34a; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">Confirmed & Paid</strong>
    </div>
  </div>

  <button [routerLink]="['/my-team']" 
          style="background: #2563eb; color: white; border: none; width: 100%; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);"
          onmouseover="this.style.background='#1d4ed8'"
          onmouseout="this.style.background='#2563eb'">
    Back to My Teams
  </button>
</div>
