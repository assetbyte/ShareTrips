<h2 mat-dialog-title style="margin: 0; color: #1e40af; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  Join the trip
</h2>

<mat-dialog-content style="padding: 25px 18px; min-width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; box-sizing: border-box;">
  <p style="color: #4b5563; font-size: 14px; margin-top: 0; margin-bottom: 12px; line-height: 1.5;">
    Write a short note to the driver explaining why you want to join this trip:
  </p>
  
  <textarea 
    [(ngModel)]="message" 
    placeholder="e.g: I want to go with you because..." 
    rows="5"
    style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; outline: none; transition: border-color 0.2s; background: #f9fafb;"
    onfocus="this.style.borderColor='#2563eb'; this.style.background='#ffffff'"
    onblur="this.style.borderColor='#d1d5db'; this.style.background='#f9fafb'"
  ></textarea>
</mat-dialog-content>

<mat-dialog-actions style="display: flex; justify-content: center; align-items: center; gap: 12px; padding: 12px 0 10px 0; margin: 0; border-top: 1px solid #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  
  <button 
    (click)="onCancel()" 
    style="background: transparent; color: #4b5563; border: 1px solid #d1d5db; padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;"
    onmouseover="this.style.background='#f3f4f6'"
    onmouseout="this.style.background='transparent'"
  >
    Cancel
  </button>
  
  <button 
    (click)="onSend()" 
    [disabled]="!message.trim()"
    [style.background]="!message.trim() ? '#9ca3af' : '#2563eb'"
    [style.cursor]="!message.trim() ? 'not-allowed' : 'pointer'"
    style="color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; transition: background 0.2s;"
    onmouseover="if(this.style.cursor!=='not-allowed') this.style.background='#1d4ed8'"
    onmouseout="if(this.style.cursor!=='not-allowed') this.style.background='#2563eb'"
  >
    Send Request
  </button>

</mat-dialog-actions>
